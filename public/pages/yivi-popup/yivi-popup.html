<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PostGuard — Yivi Authentication</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      background: #fff;
      color: #022E3D;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img { width: 32px; height: 32px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .subtitle {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 20px;
      text-align: center;
      max-width: 460px;
    }
    .sender-info {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .sender-info strong { color: #022E3D; }
    .hints {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      justify-content: center;
    }
    .hint-badge {
      display: inline-block;
      padding: 3px 10px;
      font-size: 12px;
      background: #EBF5FF;
      color: #006EF4;
      border-radius: 12px;
    }
    #yivi-web-form {
      width: 100%;
      max-width: 480px;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .yivi-help {
      margin-top: 24px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
    .yivi-help a { color: #006EF4; }
    .error {
      color: #A63232;
      font-size: 14px;
      margin-top: 16px;
      text-align: center;
    }
    .loading {
      color: #6b7280;
      font-size: 14px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../../icons/icon-64.svg" alt="PostGuard">
    <h1 id="title">PostGuard</h1>
  </div>
  <div class="subtitle" id="subtitle"></div>
  <div class="sender-info" id="sender-info" style="display:none"></div>
  <div class="hints" id="hints"></div>
  <div id="yivi-web-form"></div>
  <div class="error" id="error" style="display:none"></div>
  <div class="loading" id="loading">Initializing Yivi session...</div>
  <div class="yivi-help">
    <p><a href="https://yivi.app" target="_blank">What is Yivi?</a> &middot; <a href="https://yivi.app/download" target="_blank">Download Yivi app</a></p>
  </div>
  <script src="yivi-popup.js" type="module"></script>
</body>
</html>
